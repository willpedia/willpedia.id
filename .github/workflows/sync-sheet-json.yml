name: Sinkronkan Sheet ke JSON

on:
  schedule:
    # GitHub Actions memakai waktu UTC.
    # Sinkronisasi tetap berjalan otomatis sekitar setiap 5 menit.
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "scripts/sync_sheet_json.py"
      - ".github/workflows/sync-sheet-json.yml"

permissions:
  contents: write

concurrency:
  group: willpedia-sheet-json-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Run pertama dapat lebih lama karena membuat cache seluruh gambar produk.
    timeout-minutes: 30

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pasang pengolah gambar
        run: python -m pip install --disable-pip-version-check "Pillow>=10.4,<12"

      - name: Ambil data Sheet, optimalkan gambar, dan buat JSON
        env:
          # Opsional: buat Repository variable APPS_SCRIPT_URL
          # untuk mengganti URL bawaan di script Python.
          APPS_SCRIPT_URL: ${{ vars.APPS_SCRIPT_URL }}
          IMAGE_MAX_DIMENSION: "480"
          IMAGE_QUALITY: "76"
          IMAGE_DOWNLOAD_WORKERS: "8"
          IMAGE_DOWNLOAD_TIMEOUT: "20"
          IMAGE_REFRESH_DAYS: "30"
        run: |
          if [ -z "$APPS_SCRIPT_URL" ]; then
            unset APPS_SCRIPT_URL
          fi
          python scripts/sync_sheet_json.py

      - name: Commit hanya bila hasil sinkronisasi berubah
        shell: bash
        run: |
          FILES=(
            "data/popular.json"
            "data/reviews.json"
            "data/genshin.json"
            "data/hsr.json"
            "data/zzz.json"
            "data/wuwa.json"
            "data/product-images.json"
            "assets/images/products"
            "index.html"
          )

          if [ -z "$(git status --porcelain -- "${FILES[@]}")" ]; then
            echo "Tidak ada perubahan produk, gambar, rating, komentar, atau data populer."
            exit 0
          fi

          git config user.name "willpedia-sheet-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- "${FILES[@]}"
          git commit -m "chore: sinkronkan pricelist, ulasan, dan cache gambar produk"
          git push
