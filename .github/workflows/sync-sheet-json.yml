def request_json(params: dict[str, str]) -> dict[str, Any]:
    query = dict(params)
    query["_sync"] = str(int(time.time()))
    url = f"{BASE_URL}?{urllib.parse.urlencode(query)}"
    request = urllib.request.Request(
        url,
        headers={
            "User-Agent": "Willpedia-GitHub-Sync/5.0",
            "Accept": "application/json",
        },
    )
    with urllib.request.urlopen(request, timeout=60) as response:
        raw = response.read().decode("utf-8")
    payload = json.loads(raw)
    if not isinstance(payload, dict):
        raise ValueError("Respons Apps Script bukan object JSON.")
    if payload.get("success") is False:
        raise ValueError(str(payload.get("message") or "Apps Script mengembalikan error."))
    return payload


def _first_value(record: dict[str, Any], keys: tuple[str, ...]) -> Any:
    for key in keys:
        value = record.get(key)
        if value is not None and str(value).strip() != "":
            return value
    return None


def _clean_products(products: Any) -> list[dict[str, Any]]:
    """Hilangkan baris kosong seperti ID placeholder tanpa nama paket."""
    if not isinstance(products, list):
        raise ValueError("Respons Apps Script tidak memiliki array products.")
    cleaned: list[dict[str, Any]] = []
    for item in products:
        if not isinstance(item, dict):
            continue
        product_name = _first_value(item, PRODUCT_NAME_KEYS)
        product_id = _first_value(item, PRODUCT_ID_KEYS)
        if not product_name:
            if product_id:
                print(f"Lewati baris produk kosong: {product_id}")
            continue
        cleaned.append(item)
    return cleaned


def fetch_products(params: dict[str, str]) -> dict[str, Any]:
    payload = request_json(params)
    payload["products"] = _clean_products(payload.get("products"))
    payload["success"] = True
    return payload


def _first_list(*values: Any) -> list[Any]:
    for value in values:
        if isinstance(value, list):
            return value
    return []


def _canonical_game_name(value: Any) -> str:
    raw = str(value or "").strip().upper()
    token = "".join(character for character in raw if character.isalnum())
    aliases: dict[str, str] = {}
    for game_key, game_name in GAME_NAMES.items():
        aliases["".join(character for character in game_key.upper() if character.isalnum())] = game_name
        aliases["".join(character for character in game_name if character.isalnum())] = game_name
    aliases.update({
        "GI": "GENSHIN IMPACT",
        "GENSHIN": "GENSHIN IMPACT",
        "HONKAISTARRAIL": "HONKAI STAR RAIL",
        "STARRAIL": "HONKAI STAR RAIL",
        "HSR": "HONKAI STAR RAIL",
        "ZENLESSZONEZERO": "ZENLESS ZONE ZERO",
        "ZZZ": "ZENLESS ZONE ZERO",
        "WUTHERINGWAVES": "WUTHERING WAVES",
        "WUWA": "WUTHERING WAVES",
    })
    return aliases.get(token, raw or "GAME")


def _normalize_review(item: Any, game_name: str = "") -> dict[str, Any] | None:
    if not isinstance(item, dict):
        return None
    normalized_game = _canonical_game_name(
        item.get("Game")
        or item.get("game")
        or item.get("__gameName")
        or game_name
        or "Game"
    )
    return {
        **item,
        "Nama": item.get("Nama") or item.get("nama") or item.get("name") or "Pengguna",
        "Rating": item.get("Rating") if item.get("Rating") is not None else item.get("rating", 0),
        "Komentar": item.get("Komentar") or item.get("komentar") or item.get("comment") or item.get("ulasan") or "",
        "Tanggal": item.get("Tanggal") or item.get("tanggal") or item.get("date") or "",
        "Game": normalized_game,
        "__gameName": normalized_game,
    }


def fetch_review_data() -> tuple[dict[str, dict[str, Any]], list[dict[str, Any]]]:
    """Ambil rating dan komentar dari satu sumber, lalu hitung ulang agar selalu sinkron."""
    payload = request_json({"action": "all_game_reviews"})
    raw_games = payload.get("games")
    if not isinstance(raw_games, dict):
        raw_games = {}

    normalized_games: dict[str, dict[str, Any]] = {}
    collected_reviews: list[dict[str, Any]] = []
    for raw_game_name, raw_value in raw_games.items():
        canonical_name = _canonical_game_name(raw_game_name)
        raw = raw_value if isinstance(raw_value, dict) else {}
        normalized_games[canonical_name] = raw
        raw_comments = _first_list(
            raw.get("comments"), raw.get("komentar"), raw.get("ulasan"), raw.get("reviews")
        )
        collected_reviews.extend(
            review for item in raw_comments
            if (review := _normalize_review(item, canonical_name)) is not None
        )

    top_level_comments = _first_list(
        payload.get("comments"), payload.get("reviews"), payload.get("ulasan")
    )
    collected_reviews.extend(
        review for item in top_level_comments
        if (review := _normalize_review(item)) is not None
    )

    deduplicated: list[dict[str, Any]] = []
    seen: set[tuple[str, str, str, str]] = set()
    for review in collected_reviews:
        key = (
            str(review.get("Game", "")).lower(),
            str(review.get("Nama", "")).lower(),
            str(review.get("Komentar", "")).lower(),
            str(review.get("Tanggal", "")).lower(),
        )
        if key in seen:
            continue
        seen.add(key)
        deduplicated.append(review)

    summaries: dict[str, dict[str, Any]] = {}
    for game_key, game_name in GAME_NAMES.items():
        raw = normalized_games.get(game_name, {})
        game_reviews = [review for review in deduplicated if review.get("Game") == game_name]
        valid_ratings: list[float] = []
        for review in game_reviews:
            try:
                rating = float(review.get("Rating") or 0)
            except (TypeError, ValueError):
                rating = 0
            if 1 <= rating <= 5:
                valid_ratings.append(rating)

        raw_total = int(float(raw.get("jumlah_ulasan") or raw.get("total") or raw.get("total_reviews") or 0))
        raw_average = float(raw.get("rata_rata") or raw.get("average") or raw.get("rating") or 0)
        total = max(raw_total, len(valid_ratings), len(game_reviews))
        average = sum(valid_ratings) / len(valid_ratings) if valid_ratings else raw_average
        summaries[game_key] = {
            "average": round(max(0.0, min(5.0, average)), 1),
            "total": max(0, total),
        }

    return summaries, deduplicated


def _normalize_source_url(value: Any) -> str:
    url = str(value or "").strip().strip('"\'')
    if not url:
        return ""
    if url.startswith("//"):
        url = "https:" + url
    if url.startswith("http://"):
        url = "https://" + url[7:]
    if not re.match(r"^https://", url, flags=re.I):
        return ""
    return url


def _canonical_image_url(url: str) -> str:
    """Buang fragmen dan parameter ukuran/versi agar URL duplikat memakai satu cache."""
    parsed = urllib.parse.urlsplit(url)
    query = urllib.parse.parse_qsl(parsed.query, keep_blank_values=True)
    ignored = {
        "cb", "version", "width", "height", "w", "h", "fit", "output", "quality",
        "format", "fm", "dpr", "s",
    }
    filtered = [(key, value) for key, value in query if key.lower() not in ignored]
    return urllib.parse.urlunsplit((
        parsed.scheme.lower(),
        parsed.netloc.lower(),
        parsed.path,
        urllib.parse.urlencode(filtered, doseq=True),
        "",
    ))


def _load_image_manifest() -> dict[str, Any]:
    if not IMAGE_MANIFEST_FILE.exists():
        return {"version": 2, "images": {}}
    try:
        payload = json.loads(IMAGE_MANIFEST_FILE.read_text(encoding="utf-8"))
    except (OSError, json.JSONDecodeError):
        return {"version": 2, "images": {}}
    if not isinstance(payload, dict) or not isinstance(payload.get("images"), dict):
        return {"version": 2, "images": {}}
    payload["version"] = 2
    return payload


def _manifest_entry_is_fresh(entry: Any, target: Path) -> bool:
    if not isinstance(entry, dict) or not target.exists() or target.stat().st_size <= 0:
        return False
    checked_at = str(entry.get("checked_at") or "")
    try:
        checked = datetime.fromisoformat(checked_at.replace("Z", "+00:00"))
        if checked.tzinfo is None:
            checked = checked.replace(tzinfo=timezone.utc)
    except ValueError:
        return False
    return datetime.now(timezone.utc) - checked < timedelta(days=IMAGE_REFRESH_DAYS)



FANDOM_SPECIAL_REDIRECT_RE = re.compile(
    r"^/wiki/Special:Redirect/file/(?P<filename>.+)$",
    flags=re.IGNORECASE,
)


def _open_with_retry(
    request: urllib.request.Request,
    *,
    timeout: int,
    attempts: int = IMAGE_DOWNLOAD_RETRIES,
) -> Any:
    """Buka URL dengan retry untuk timeout, 429, dan error server sementara."""
    last_error: Exception | None = None
    for attempt in range(1, attempts + 1):
        try:
            return urllib.request.urlopen(request, timeout=timeout)
        except urllib.error.HTTPError as exc:
            last_error = exc
            # 4xx selain 408/425/429 biasanya permanen dan tidak perlu diulang.
            if exc.code not in {408, 425, 429} and not 500 <= exc.code <= 599:
                raise
        except (urllib.error.URLError, TimeoutError, OSError) as exc:
            last_error = exc

        if attempt < attempts:
            # Backoff singkat supaya workflow tidak membanjiri server sumber.
            time.sleep(min(4.0, 0.75 * (2 ** (attempt - 1))))

    if last_error is not None:
        raise last_error
    raise RuntimeError("Permintaan gagal tanpa detail error.")


def _fandom_special_redirect_parts(url: str) -> tuple[str, str] | None:
    """Ambil host wiki dan nama file dari URL Fandom Special:Redirect/file."""
    parsed = urllib.parse.urlsplit(url)
    host = parsed.netloc.lower().split(":", 1)[0]
    if not host.endswith(".fandom.com"):
        return None

    match = FANDOM_SPECIAL_REDIRECT_RE.match(parsed.path)
    if not match:
        return None

    filename = urllib.parse.unquote(match.group("filename")).strip().replace("_", " ")
    # Nama file MediaWiki tidak boleh kosong dan tidak boleh menyisipkan path lain.
    if not filename or "/" in filename or "\\" in filename:
        return None
    return host, filename


def _extract_imageinfo_url(payload: Any) -> str:
    """Ambil thumburl/url dari respons action=query&prop=imageinfo."""
    if not isinstance(payload, dict):
        raise ValueError("Respons API Fandom bukan object JSON.")

    error = payload.get("error")
    if isinstance(error, dict):
        code = str(error.get("code") or "api-error")
        info = str(error.get("info") or "MediaWiki API mengembalikan error.")
        raise ValueError(f"Fandom API {code}: {info}")

    query = payload.get("query")
    if not isinstance(query, dict):
        raise ValueError("Respons API Fandom tidak memiliki query.")

    pages = query.get("pages")
    page_values: list[Any]
    if isinstance(pages, list):
        page_values = pages
    elif isinstance(pages, dict):
        page_values = list(pages.values())
    else:
        page_values = []

    for page in page_values:
        if not isinstance(page, dict) or page.get("missing") is not None:
            continue
        imageinfo = page.get("imageinfo")
        if not isinstance(imageinfo, list) or not imageinfo:
            continue
        info = imageinfo[0]
        if not isinstance(info, dict):
            continue
        candidate = str(info.get("thumburl") or info.get("url") or "").strip()
        if candidate.startswith("//"):
            candidate = "https:" + candidate
        if candidate.startswith("https://"):
            return candidate

    raise ValueError("File Fandom tidak ditemukan atau tidak memiliki URL gambar.")


def _resolve_fandom_file_url(source_url: str) -> str:
    """Ubah URL Special:Redirect/file menjadi URL gambar langsung via MediaWiki API."""
    parts = _fandom_special_redirect_parts(source_url)
    if parts is None:
        return source_url

    host, filename = parts
    api_url = f"https://{host}/api.php?" + urllib.parse.urlencode({
        "action": "query",
        "format": "json",
        "formatversion": "2",
        "prop": "imageinfo",
        "iiprop": "url|mime|size",
        # Minta thumbnail dari server wiki agar transfer pertama lebih kecil.
        "iiurlwidth": str(IMAGE_MAX_DIMENSION),
        "redirects": "1",
        "titles": f"File:{filename}",
    })
    request = urllib.request.Request(
        api_url,
        headers={
            "User-Agent": "Willpedia-GitHub-Sync/5.0 (product image cache)",
            "Accept": "application/json",
            "Cache-Control": "no-cache",
        },
    )
    with _open_with_retry(
        request,
        timeout=FANDOM_API_TIMEOUT,
        attempts=IMAGE_DOWNLOAD_RETRIES,
    ) as response:
        raw = _read_limited_response(response)
    try:
        payload = json.loads(raw.decode("utf-8"))
    except (UnicodeDecodeError, json.JSONDecodeError) as exc:
        raise ValueError("Respons API Fandom bukan JSON yang valid.") from exc
    return _extract_imageinfo_url(payload)


def _read_limited_response(response: Any) -> bytes:
    content_length = response.headers.get("Content-Length")
    if content_length:
        try:
            if int(content_length) > IMAGE_MAX_BYTES:
                raise ValueError(f"Gambar melebihi batas {IMAGE_MAX_BYTES} byte.")
        except ValueError as exc:
            if "melebihi" in str(exc):
                raise
    chunks: list[bytes] = []
    total = 0
    while True:
        chunk = response.read(64 * 1024)
        if not chunk:
            break
        total += len(chunk)
        if total > IMAGE_MAX_BYTES:
            raise ValueError(f"Gambar melebihi batas {IMAGE_MAX_BYTES} byte.")
        chunks.append(chunk)
    return b"".join(chunks)


def _download_image_bytes(url: str) -> tuple[bytes, str]:
    # URL Special:Redirect/file milik Fandom adalah halaman perantara. Resolusi
    # melalui MediaWiki API mencegah HTML/anti-bot ikut dianggap sebagai gambar.
    resolved_url = url
    resolution_error: Exception | None = None
    try:
        resolved_url = _resolve_fandom_file_url(url)
    except Exception as exc:
        # Tetap coba URL asli sebagai fallback agar satu kegagalan API tidak
        # langsung menggagalkan gambar yang mungkin masih bisa di-redirect.
        resolution_error = exc
        resolved_url = url

    parsed = urllib.parse.urlsplit(resolved_url)
    referer_host = parsed.netloc
    original_parts = _fandom_special_redirect_parts(url)
    if original_parts is not None:
        referer_host = original_parts[0]
    referer = f"https://{referer_host}/" if referer_host else "https://willpedia.com/"

    request = urllib.request.Request(
        resolved_url,
        headers={
            "User-Agent": (
                "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                "AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
            ),
            "Accept": "image/avif,image/webp,image/apng,image/png,image/jpeg,image/*;q=0.8,*/*;q=0.2",
            "Referer": referer,
            "Cache-Control": "no-cache",
        },
    )
    try:
        with _open_with_retry(
            request,
            timeout=IMAGE_DOWNLOAD_TIMEOUT,
            attempts=IMAGE_DOWNLOAD_RETRIES,
        ) as response:
            final_url = response.geturl()
            content_type = str(response.headers.get("Content-Type") or "").lower()
            data = _read_limited_response(response)
    except Exception as exc:
        if resolution_error is not None:
            raise ValueError(
                f"Resolusi Fandom gagal ({resolution_error}); unduhan URL asli juga gagal ({exc})."
            ) from exc
        raise

    if not data:
        raise ValueError("Respons gambar kosong.")
    if content_type and not (
        content_type.startswith("image/")
        or "application/octet-stream" in content_type
        or "binary/octet-stream" in content_type
    ):
        detail = f" Content-Type={content_type}."
        if resolution_error is not None:
            detail += f" Resolusi Fandom sebelumnya gagal: {resolution_error}."
        raise ValueError("Respons URL bukan file gambar." + detail)
    return data, final_url


def _convert_to_webp(data: bytes) -> tuple[bytes, int, int]:
    try:
        with Image.open(io.BytesIO(data)) as source:
            source.seek(0)
            image = ImageOps.exif_transpose(source).copy()
    except (UnidentifiedImageError, OSError) as exc:
        raise ValueError("Respons bukan gambar raster yang didukung.") from exc

    if image.width < 2 or image.height < 2:
        raise ValueError("Dimensi gambar tidak valid.")

    has_alpha = image.mode in {"RGBA", "LA"} or (
        image.mode == "P" and "transparency" in image.info
    )
    image = image.convert("RGBA" if has_alpha else "RGB")
    image.thumbnail((IMAGE_MAX_DIMENSION, IMAGE_MAX_DIMENSION), Image.Resampling.LANCZOS)

    output = io.BytesIO()
    image.save(
        output,
        format="WEBP",
        quality=IMAGE_QUALITY,
        method=6,
        optimize=True,
    )
    encoded = output.getvalue()
    if not encoded:
        raise ValueError("Konversi WebP menghasilkan file kosong.")
    return encoded, image.width, image.height


def _cache_key(url: str) -> str:
    return hashlib.sha256(_canonical_image_url(url).encode("utf-8")).hexdigest()[:20]


def _relative_image_path(game_key: str, cache_key: str) -> str:
    safe_game = game_key if game_key in GAME_FILES else "shared"
    return f"assets/images/products/{safe_game}/{cache_key}.webp"


def _download_and_cache_image(
    source_url: str,
    game_key: str,
    old_entry: dict[str, Any] | None,
) -> tuple[str, dict[str, Any], bool]:
    key = _cache_key(source_url)
    relative_path = _relative_image_path(game_key, key)
    target = ROOT / relative_path
    if _manifest_entry_is_fresh(old_entry, target):
        return relative_path, old_entry or {}, False

    data, final_url = _download_image_bytes(source_url)
    webp, width, height = _convert_to_webp(data)
    content_hash = hashlib.sha256(webp).hexdigest()
    changed = True
    if target.exists() and hashlib.sha256(target.read_bytes()).hexdigest() == content_hash:
        changed = False
    else:
        target.parent.mkdir(parents=True, exist_ok=True)
        temporary = target.with_suffix(".webp.tmp")
        temporary.write_bytes(webp)
        temporary.replace(target)

    entry = {
        "source": source_url,
        "final_url": final_url,
        "path": relative_path,
        "width": width,
        "height": height,
        "bytes": len(webp),
        "sha256": content_hash,
        "checked_at": datetime.now(timezone.utc).isoformat(timespec="seconds").replace("+00:00", "Z"),
    }
    return relative_path, entry, changed


def _product_source_image(product: dict[str, Any]) -> str:
    source = _first_value(product, SOURCE_IMAGE_KEYS)
    if source:
        return _normalize_source_url(source)
    current = _first_value(product, PRODUCT_IMAGE_KEYS)
    return _normalize_source_url(current)


def _infer_product_game_key(product: dict[str, Any], fallback: str) -> str:
    if fallback in GAME_FILES:
        return fallback
    raw_game = str(product.get("Game") or product.get("game") or product.get("__gameName") or "")
    canonical_name = _canonical_game_name(raw_game)
    for game_key, game_name in GAME_NAMES.items():
        if canonical_name == game_name:
            return game_key
    product_id = str(_first_value(product, PRODUCT_ID_KEYS) or "").upper()
    if product_id.startswith("GI-"):
        return "genshin"
    if product_id.startswith("HSR-"):
        return "hsr"
    if product_id.startswith("ZZZ-"):
        return "zzz"
    if product_id.startswith("WUWA-"):
        return "wuwa"
    return "shared"


def _apply_local_product_images(
    payloads: dict[str, dict[str, Any]],
) -> tuple[dict[str, Any], int, int, int]:
    """Cache URL unik secara paralel lalu tulis path lokal ke seluruh payload."""
    manifest = _load_image_manifest()
    images = manifest.setdefault("images", {})
    if not isinstance(images, dict):
        images = {}
        manifest["images"] = images

    # URL yang sama dalam satu game hanya diunduh sekali.
    jobs: dict[tuple[str, str], list[dict[str, Any]]] = {}
    for game_key, payload in payloads.items():
        products = payload.get("products")
        if not isinstance(products, list):
            continue
        for product in products:
            if not isinstance(product, dict):
                continue
            source_url = _product_source_image(product)
            if not source_url:
                continue
            canonical = _canonical_image_url(source_url)
            effective_game_key = _infer_product_game_key(product, game_key)
            jobs.setdefault((effective_game_key, canonical), []).append(product)
            product["Gambar_Sumber"] = source_url

    downloaded = 0
    reused = 0
    failed = 0
    results: dict[tuple[str, str], tuple[str | None, dict[str, Any] | None]] = {}

    def run_job(job_key: tuple[str, str]) -> tuple[tuple[str, str], str, dict[str, Any], bool]:
        game_key, canonical = job_key
        products = jobs[job_key]
        source_url = _product_source_image(products[0])
        manifest_key = f"{game_key}:{_cache_key(source_url)}"
        old_entry = images.get(manifest_key)
        relative_path, entry, changed = _download_and_cache_image(
            source_url,
            game_key,
            old_entry if isinstance(old_entry, dict) else None,
        )
        return job_key, relative_path, {"manifest_key": manifest_key, **entry}, changed

    with ThreadPoolExecutor(max_workers=IMAGE_DOWNLOAD_WORKERS) as executor:
        future_map = {executor.submit(run_job, job_key): job_key for job_key in jobs}
        for future in as_completed(future_map):
            job_key = future_map[future]
            try:
                completed_key, relative_path, entry_with_key, changed = future.result()
                manifest_key = str(entry_with_key.pop("manifest_key"))
                images[manifest_key] = entry_with_key
                results[completed_key] = (relative_path, entry_with_key)
                if changed:
                    downloaded += 1
                    print(f"Gambar lokal diperbarui: {relative_path}")
                else:
                    reused += 1
            except Exception as exc:  # Gagal satu gambar tidak boleh menggagalkan semua data.
                failed += 1
                results[job_key] = (None, None)
                game_key, _ = job_key
                sample = jobs[job_key][0]
                source_url = _product_source_image(sample)
                print(f"Peringatan gambar {game_key}: {source_url} -> {exc}", file=sys.stderr)

    for job_key, products in jobs.items():
        relative_path, _ = results.get(job_key, (None, None))
        for product in products:
            source_url = _product_source_image(product)
            product["Gambar_Sumber"] = source_url
            if relative_path:
                product["Gambar"] = relative_path
            elif source_url:
                # Fallback aman: tetap gunakan URL sumber bila cache belum berhasil.
                product["Gambar"] = source_url

    manifest["version"] = 2
    manifest["settings"] = {
        "max_dimension": IMAGE_MAX_DIMENSION,
        "quality": IMAGE_QUALITY,
        "refresh_days": IMAGE_REFRESH_DAYS,
        "download_retries": IMAGE_DOWNLOAD_RETRIES,
        "fandom_api": True,
    }
    return manifest, downloaded, reused, failed


def serialize(payload: dict[str, Any]) -> str:
    # Deterministik: file tidak berubah jika produk/rating tidak berubah.
    return json.dumps(payload, ensure_ascii=False, separators=(",", ":"), sort_keys=True) + "\n"


def write_if_changed(path: Path, content: str) -> bool:
    old = path.read_text(encoding="utf-8") if path.exists() else ""
    if old == content:
        print(f"Tidak berubah: {path.relative_to(ROOT)}")
        return False
    path.parent.mkdir(parents=True, exist_ok=True)
    temp = path.with_suffix(path.suffix + ".tmp")
    temp.write_text(content, encoding="utf-8")
    temp.replace(path)
    print(f"Diperbarui: {path.relative_to(ROOT)}")
    return True


def embed_popular_payload(payload: dict[str, Any]) -> bool:
    """Tanam data populer ke index.html agar halaman home tidak perlu fetch saat dibuka."""
    if not HOME_FILE.exists():
        raise ValueError("index.html tidak ditemukan untuk penyisipan data populer.")
    html = HOME_FILE.read_text(encoding="utf-8")
    start = html.find(POPULAR_DATA_START)
    end = html.find(POPULAR_DATA_END, start + len(POPULAR_DATA_START))
    if start < 0 or end < 0:
        raise ValueError("Marker data populer tidak ditemukan di index.html.")
    safe_json = json.dumps(
        payload, ensure_ascii=False, separators=(",", ":"), sort_keys=True
    ).replace("</", "<\\/")
    block = (
        f"{POPULAR_DATA_START}\n"
        f"    <script id=\"willpedia-popular-data\" type=\"application/json\">"
        f"{safe_json}</script>\n"
        f"    {POPULAR_DATA_END}"
    )
    updated = html[:start] + block + html[end + len(POPULAR_DATA_END):]
    return write_if_changed(HOME_FILE, updated)


def main() -> int:
    if not BASE_URL.startswith("https://script.google.com/"):
        print("APPS_SCRIPT_URL tidak valid.", file=sys.stderr)
        return 2

    DATA_DIR.mkdir(parents=True, exist_ok=True)
    IMAGE_ROOT.mkdir(parents=True, exist_ok=True)
    changed = 0

    try:
        ratings, reviews = fetch_review_data()

        # Ambil semua payload dahulu agar cache gambar dapat dibuat satu kali per URL unik.
        popular = fetch_products({"action": "popular"})
        popular["ratings"] = ratings
        game_payloads: dict[str, dict[str, Any]] = {}
        for game_key in GAME_FILES:
            payload = fetch_products({"action": "products", "game": game_key})
            payload["rating"] = ratings.get(game_key, {"average": 0, "total": 0})
            game_payloads[game_key] = payload

        # Popular diproses sebagai grup tersendiri, tetapi URL yang sudah ada di game tetap
        # memakai file yang sama bila canonical URL-nya identik.
        all_payloads = {**game_payloads, "popular": popular}
        manifest, downloaded, reused, failed = _apply_local_product_images(all_payloads)

        changed += int(write_if_changed(
            DATA_DIR / "reviews.json",
            serialize({"success": True, "ratings": ratings, "reviews": reviews}),
        ))
        changed += int(write_if_changed(DATA_DIR / "popular.json", serialize(popular)))
        changed += int(write_if_changed(IMAGE_MANIFEST_FILE, serialize(manifest)))
        changed += int(embed_popular_payload(popular))

        for game_key, filename in GAME_FILES.items():
            changed += int(write_if_changed(DATA_DIR / filename, serialize(game_payloads[game_key])))

    except (
        urllib.error.URLError,
        urllib.error.HTTPError,
        TimeoutError,
        json.JSONDecodeError,
        ValueError,
    ) as exc:
        print(f"Sinkronisasi gagal: {exc}", file=sys.stderr)
        return 1

    print(
        "Sinkronisasi selesai. "
        f"{changed} file data berubah; gambar baru/diperbarui={downloaded}, "
        f"cache digunakan={reused}, gagal={failed}."
    )
    return 0


if __name__ == "__main__":
    raise SystemExit(main())
